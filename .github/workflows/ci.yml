name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: finance_user
          POSTGRES_PASSWORD: finance_pass
          POSTGRES_DB: finance_app_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U finance_user -d finance_app_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_ENV: development
      SECRET_KEY: ci-secret-key-with-at-least-32-characters
      CORS_ORIGINS: http://localhost:3000
      DATABASE_URL: postgresql+psycopg://finance_user:finance_pass@localhost:5432/finance_app_test
      TEST_DATABASE_URL: postgresql+psycopg://finance_user:finance_pass@localhost:5432/finance_app_test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run pytest
        run: pytest

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    env:
      NEXT_PUBLIC_API_URL: http://localhost:8000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint --if-present

      - name: Build production bundle
        run: npm run build

  docker:
    name: Docker Validation
    runs-on: ubuntu-latest

    env:
      POSTGRES_USER: finance_user
      POSTGRES_PASSWORD: finance_pass
      POSTGRES_DB: finance_app
      SECRET_KEY: ci-secret-key-with-at-least-32-characters
      CORS_ORIGINS: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:8000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build -t finance-app-backend:ci ./backend

      - name: Build frontend Docker image
        run: docker build --build-arg NEXT_PUBLIC_API_URL=${{ env.NEXT_PUBLIC_API_URL }} -t finance-app-frontend:ci ./frontend

      - name: Validate Docker Compose configuration
        run: docker compose config --quiet
